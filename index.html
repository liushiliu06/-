<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>你进来干嘛</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .entry,
    .message {
      display: grid;
      place-items: center;
      min-height: 100%;
      width: 100%;
    }

    .entry button {
      border: 1px solid rgba(248, 250, 252, 0.2);
      border-radius: 999px;
      padding: 16px 32px;
      background: #f8fafc;
      color: #0f172a;
      cursor: pointer;
      font: inherit;
      font-size: clamp(22px, 5vw, 38px);
      font-weight: 700;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .entry button:hover {
      transform: translateY(-2px);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.42);
    }

    .message {
      display: none;
      font-size: clamp(36px, 8vw, 88px);
      font-weight: 700;
    }

    body.entered .entry {
      display: none;
    }

    body.entered .message {
      display: grid;
    }
  </style>
</head>
<body>
  <main class="entry">
    <button type="button" id="enterButton">点击进入</button>
  </main>
  <main class="message">你进来干嘛</main>
  <script>
    document.getElementById("enterButton").addEventListener("click", function () {
      document.body.classList.add("entered");
    });
  </script>
</body>
</html>
