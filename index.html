<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>你进来干嘛</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 0, 221, 0.85), transparent 28%),
        radial-gradient(circle at 82% 76%, rgba(0, 255, 221, 0.72), transparent 30%),
        repeating-linear-gradient(45deg, #050505 0 16px, #191919 16px 32px);
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      animation: pageFlash 0.72s steps(2, end) infinite;
    }

    body::after {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      content: "";
      background: repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.08) 0 1px, transparent 1px 4px);
      mix-blend-mode: screen;
      opacity: 0.38;
    }

    .entry,
    .message {
      display: grid;
      place-items: center;
      min-height: 100%;
      width: 100%;
    }

    .entry {
      position: relative;
      overflow: hidden;
    }

    .entry::before {
      position: absolute;
      inset: -35%;
      z-index: 0;
      content: "";
      background: conic-gradient(#ff0000, #ffff00, #00ff66, #00e5ff, #ff00ff, #ff0000);
      opacity: 0.16;
      animation: spinBg 7s linear infinite;
    }

    .ticker {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 4;
      width: 100%;
      overflow: hidden;
      border-bottom: 4px double #ff0000;
      background: #ffff00;
      color: #000;
      font-size: clamp(14px, 2.7vw, 28px);
      font-weight: 900;
      white-space: nowrap;
    }

    .ticker span {
      display: inline-block;
      padding: 8px 0;
      animation: tickerMove 7s linear infinite;
    }

    .corner-ad {
      position: absolute;
      z-index: 3;
      width: min(190px, 32vw);
      border: 4px ridge #ffff00;
      background: #ff004c;
      color: #fff;
      padding: 10px;
      text-align: center;
      font-size: clamp(12px, 2.6vw, 22px);
      font-weight: 900;
      line-height: 1.25;
      text-shadow: 2px 2px #000;
      box-shadow: 0 0 24px rgba(255, 255, 0, 0.9);
      animation: adShake 0.32s steps(2, end) infinite;
    }

    .corner-ad.left {
      left: 12px;
      bottom: 18px;
      transform: rotate(-6deg);
    }

    .corner-ad.right {
      right: 12px;
      top: 64px;
      transform: rotate(5deg);
    }

    .gate {
      position: relative;
      z-index: 4;
      display: grid;
      gap: 14px;
      justify-items: center;
      border: 5px outset #ffea00;
      background: rgba(0, 0, 0, 0.72);
      padding: clamp(18px, 4vw, 34px);
      text-align: center;
      box-shadow: 0 0 0 6px #ff00d4, 0 0 38px rgba(255, 234, 0, 0.75);
      animation: gateFloat 0.54s ease-in-out infinite alternate;
    }

    .gate-title {
      color: #ffff00;
      font-size: clamp(20px, 5vw, 46px);
      font-weight: 900;
      text-shadow: 3px 3px 0 #ff004c, -3px -3px 0 #00f0ff;
      animation: blinkText 0.5s steps(2, end) infinite;
    }

    .float-photo {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 1;
      width: clamp(192px, 32vw, 360px);
      max-height: 68vh;
      border: 5px dashed #ffff00;
      border-radius: 4px;
      object-fit: cover;
      filter: saturate(1.45) contrast(1.08);
      box-shadow: 0 0 0 4px #ff00d4, 0 18px 42px rgba(0, 0, 0, 0.62);
      pointer-events: none;
      will-change: transform;
    }

    .entry button {
      position: relative;
      z-index: 2;
      border: 5px outset #ffff00;
      border-radius: 0;
      padding: 18px 38px;
      background: linear-gradient(180deg, #ffff00, #ff2d00);
      color: #000;
      cursor: pointer;
      font: inherit;
      font-size: clamp(22px, 5vw, 38px);
      font-weight: 900;
      text-shadow: 1px 1px 0 #fff;
      box-shadow: 0 0 0 5px #00f0ff, 0 24px 60px rgba(0, 0, 0, 0.65);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      animation: breathe 0.8s ease-in-out infinite;
    }

    .entry button:hover {
      transform: translateY(-2px);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.42);
      animation-play-state: paused;
    }

    @keyframes breathe {
      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.08);
      }
    }

    .message {
      display: none;
      font-size: clamp(36px, 8vw, 88px);
      font-weight: 900;
      color: #ffff00;
      text-align: center;
      text-shadow: 4px 4px 0 #ff004c, -4px -4px 0 #00f0ff, 0 0 26px #fff;
      animation: blinkText 0.42s steps(2, end) infinite;
    }

    body.entered .entry {
      display: none;
    }

    body.entered .message {
      display: grid;
    }

    @keyframes pageFlash {
      0% {
        filter: hue-rotate(0deg) saturate(1.15);
      }

      100% {
        filter: hue-rotate(18deg) saturate(1.55);
      }
    }

    @keyframes spinBg {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes tickerMove {
      from {
        transform: translateX(100vw);
      }

      to {
        transform: translateX(-100%);
      }
    }

    @keyframes adShake {
      0% {
        margin-left: 0;
      }

      100% {
        margin-left: 5px;
      }
    }

    @keyframes gateFloat {
      from {
        transform: rotate(-1deg) scale(1);
      }

      to {
        transform: rotate(1deg) scale(1.03);
      }
    }

    @keyframes blinkText {
      0%,
      49% {
        opacity: 1;
      }

      50%,
      100% {
        opacity: 0.45;
      }
    }
  </style>
</head>
<body>
  <main class="entry">
    <div class="ticker">
      <span>限时入口正在加载中　点击进入　点击进入　点击进入　本站风格十分可疑　请保持好奇心　</span>
    </div>
    <div class="corner-ad left">今日推荐<br>神秘照片<br>马上查看</div>
    <div class="corner-ad right">高速通道<br>无需等待<br>点击中间</div>
    <img class="float-photo" src="photo-1.jpg" alt="">
    <img class="float-photo" src="photo-2.jpg" alt="">
    <img class="float-photo" src="photo-3.jpg" alt="">
    <section class="gate">
      <div class="gate-title">你确定要进去吗</div>
      <button type="button" id="enterButton">点击进入</button>
    </section>
  </main>
  <main class="message">你进来干嘛</main>
  <script>
    const entry = document.querySelector(".entry");
    const floatingPhotos = Array.from(document.querySelectorAll(".float-photo"));
    const photoSpeeds = [
      { vx: 150, vy: 110 },
      { vx: -135, vy: 145 },
      { vx: 120, vy: -155 }
    ];
    let photos = [];
    let lastFrameTime = performance.now();

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function preparePhotos() {
      const bounds = entry.getBoundingClientRect();

      photos = floatingPhotos.map(function (element, index) {
        const width = element.offsetWidth;
        const height = element.offsetHeight;

        return {
          element,
          width,
          height,
          x: randomBetween(20, Math.max(21, bounds.width - width - 20)),
          y: randomBetween(20, Math.max(21, bounds.height - height - 20)),
          vx: photoSpeeds[index].vx,
          vy: photoSpeeds[index].vy
        };
      });
    }

    function keepInBounds(photo, bounds) {
      if (photo.x <= 0) {
        photo.x = 0;
        photo.vx = Math.abs(photo.vx);
      }

      if (photo.x + photo.width >= bounds.width) {
        photo.x = bounds.width - photo.width;
        photo.vx = -Math.abs(photo.vx);
      }

      if (photo.y <= 0) {
        photo.y = 0;
        photo.vy = Math.abs(photo.vy);
      }

      if (photo.y + photo.height >= bounds.height) {
        photo.y = bounds.height - photo.height;
        photo.vy = -Math.abs(photo.vy);
      }
    }

    function bounceApart(first, second) {
      const firstCenterX = first.x + first.width / 2;
      const firstCenterY = first.y + first.height / 2;
      const secondCenterX = second.x + second.width / 2;
      const secondCenterY = second.y + second.height / 2;
      const overlapX = first.width / 2 + second.width / 2 - Math.abs(firstCenterX - secondCenterX);
      const overlapY = first.height / 2 + second.height / 2 - Math.abs(firstCenterY - secondCenterY);

      if (overlapX <= 0 || overlapY <= 0) {
        return;
      }

      if (overlapX < overlapY) {
        const direction = firstCenterX < secondCenterX ? -1 : 1;
        first.x += direction * overlapX / 2;
        second.x -= direction * overlapX / 2;
        const firstVelocity = first.vx;
        first.vx = second.vx;
        second.vx = firstVelocity;
      } else {
        const direction = firstCenterY < secondCenterY ? -1 : 1;
        first.y += direction * overlapY / 2;
        second.y -= direction * overlapY / 2;
        const firstVelocity = first.vy;
        first.vy = second.vy;
        second.vy = firstVelocity;
      }
    }

    function movePhotos(now) {
      if (document.body.classList.contains("entered")) {
        return;
      }

      const bounds = entry.getBoundingClientRect();
      const seconds = Math.min((now - lastFrameTime) / 1000, 0.04);
      const scale = 1 + Math.sin(now / 500 * Math.PI * 2) * 0.08;
      lastFrameTime = now;

      photos.forEach(function (photo) {
        photo.width = photo.element.offsetWidth;
        photo.height = photo.element.offsetHeight;
        photo.x += photo.vx * seconds;
        photo.y += photo.vy * seconds;
        keepInBounds(photo, bounds);
      });

      for (let i = 0; i < photos.length; i += 1) {
        for (let j = i + 1; j < photos.length; j += 1) {
          bounceApart(photos[i], photos[j]);
        }
      }

      photos.forEach(function (photo) {
        keepInBounds(photo, bounds);
        photo.element.style.transform = "translate3d(" + photo.x + "px, " + photo.y + "px, 0) scale(" + scale + ")";
      });

      requestAnimationFrame(movePhotos);
    }

    window.addEventListener("load", function () {
      preparePhotos();
      requestAnimationFrame(movePhotos);
    });

    window.addEventListener("resize", preparePhotos);

    document.getElementById("enterButton").addEventListener("click", function () {
      document.body.classList.add("entered");
    });
  </script>
</body>
</html>
